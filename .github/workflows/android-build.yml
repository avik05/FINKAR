name: Build Android TWA

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure SDK & JDK Paths
        run: |
          # Skip telemetry to prevent interactive prompts
          echo "BUBBLEWRAP_SKIP_TELEMETRY=true" >> $GITHUB_ENV
          
          # Manually create the config directory and file to bypass interactive setup
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # Verify the config
          bubblewrap doctor

      - name: Create Keys (for First Build)
        run: |
          # Create a dummy keystore for the unsigned/debug build
          # In a real production setup, these would be GitHub Secrets
          keytool -genkey -v -keystore android.keystore -alias androidkey -keyalg RSA -keysize 2048 -validity 10000 -storepass "finkar123" -keypass "finkar123" -dname "CN=Finkar, OU=Engineering, O=Finkar, L=Unknown, S=Unknown, C=US"

      - name: Build Android Bundle
        run: |
          # Run build using the manifest in the repo
          # We provide the passwords via environment variables
          export BUBBLEWRAP_KEYSTORE_PASSWORD="finkar123"
          export BUBBLEWRAP_KEY_PASSWORD="finkar123"
          bubblewrap build --skipSigning

      - name: Upload Android Bundle
        uses: actions/upload-artifact@v4
        with:
          name: finkar-android-bundle
          path: |
            *.aab
            *.apk
