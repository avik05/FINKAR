name: Build Android TWA

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure SDK & JDK Paths
        run: |
          # Skip telemetry to prevent interactive prompts
          echo "BUBBLEWRAP_SKIP_TELEMETRY=true" >> $GITHUB_ENV
          
          # Manually create the config directory and file using the official environment variables
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Verify the config
          bubblewrap doctor

      - name: Create Keys (for First Build)
        run: |
          # NOTE: In a production setup, use GitHub Secrets (e.g., ${{ secrets.KEYSTORE_PASSWORD }})
          # This dummy step is for demonstration/debug only.
          keytool -genkey -v -keystore android.keystore -alias androidkey -keyalg RSA -keysize 2048 -validity 10000 -storepass "temporary_password" -keypass "temporary_password" -dname "CN=Finkar, OU=Engineering, O=Finkar, L=Unknown, S=Unknown, C=US"

      - name: Build Android Bundle
        run: |
          # Use 'yes' pipe to handle any remaining interactive prompts automatically
          export BUBBLEWRAP_KEYSTORE_PASSWORD="temporary_password"
          export BUBBLEWRAP_KEY_PASSWORD="temporary_password"
          yes | bubblewrap build --skipSigning

      - name: Upload Android Bundle
        uses: actions/upload-artifact@v4
        with:
          name: finkar-android-bundle
          path: |
            *.aab
            *.apk
